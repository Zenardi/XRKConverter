name: Release

# Cuts a downloadable macOS build. Trigger by pushing a version tag (e.g. v0.1.0)
# or running manually. Verifies the 95% gate + E2E before building, so every
# published artifact passed CI.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  verify:
    name: Verify (lint, coverage, e2e)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python3 -m pip install --upgrade pip ruff
      - run: python3 -m ruff check core scripts
      - run: bash scripts/fetch_samples.sh
      - run: bash scripts/coverage.sh
      - run: bash scripts/e2e.sh

  build:
    name: Build & package XRKConverter.app
    needs: verify
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Bundle embedded Python + build the app
        run: |
          bash scripts/bundle_python.sh
          bash scripts/build_app.sh

      - name: Package (zip + dmg)
        run: |
          cd dist
          ditto -c -k --keepParent XRKConverter.app XRKConverter-macos-arm64.zip
          hdiutil create -volname "XRK to CSV" -srcfolder XRKConverter.app \
            -ov -format UDZO XRKConverter-macos-arm64.dmg
          shasum -a 256 XRKConverter-macos-arm64.* > SHA256SUMS.txt
          ls -lh

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: XRKConverter-macos-arm64
          path: |
            dist/XRKConverter-macos-arm64.zip
            dist/XRKConverter-macos-arm64.dmg
            dist/SHA256SUMS.txt

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/XRKConverter-macos-arm64.zip
            dist/XRKConverter-macos-arm64.dmg
            dist/SHA256SUMS.txt
          generate_release_notes: true
          body: |
            ## XRK → RaceChrono CSV — macOS (Apple Silicon)

            Download **XRKConverter-macos-arm64.dmg**, open it, and drag the app to
            Applications. Drop an `.xrk`/`.xrz` file on the window and convert.

            > **First launch:** the app is ad-hoc signed (not notarized), so macOS
            > Gatekeeper will warn. Right-click the app → **Open** → **Open**, or run:
            > `xattr -dr com.apple.quarantine /Applications/XRKConverter.app`

            Requires macOS 13+ on Apple Silicon.
