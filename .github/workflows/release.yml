name: Release

# Cuts a downloadable macOS build. Trigger by pushing a version tag (e.g. v0.1.0)
# or running manually. Verifies the 95% gate + E2E before building, so every
# published artifact passed CI.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  verify:
    name: Verify (lint, coverage, e2e)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python3 -m pip install --upgrade pip ruff
      - run: python3 -m ruff check core scripts
      - run: bash scripts/fetch_samples.sh
      - run: bash scripts/coverage.sh
      - run: bash scripts/e2e.sh

  build:
    name: Build, sign, notarize & package
    needs: verify
    runs-on: macos-15
    # Signing + notarization run only when the required secrets are configured;
    # otherwise the build falls back to an ad-hoc signature (still publishable).
    env:
      SIGNING_ENABLED: ${{ (secrets.MACOS_CERTIFICATE_P12_BASE64 != '' && secrets.MACOS_NOTARY_KEY_P8_BASE64 != '') && 'true' || 'false' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Import Developer ID certificate
        if: ${{ env.SIGNING_ENABLED == 'true' }}
        env:
          P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN="$RUNNER_TEMP/build.keychain-db"
          KP="$(openssl rand -base64 24)"
          echo "$P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security create-keychain -p "$KP" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security default-keychain -s "$KEYCHAIN"
          security unlock-keychain -p "$KP" "$KEYCHAIN"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$P12_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KP" "$KEYCHAIN" >/dev/null
          rm -f "$RUNNER_TEMP/cert.p12"

      - name: Bundle embedded Python + build the app
        env:
          SIGN_IDENTITY: ${{ env.SIGNING_ENABLED == 'true' && secrets.MACOS_SIGN_IDENTITY || '' }}
          ENTITLEMENTS: app/XRKConverter.entitlements
        run: |
          bash scripts/bundle_python.sh
          # Derive the app version from the tag (v0.2.0 -> 0.2.0); leave default for non-tag dispatch.
          REF="${GITHUB_REF_NAME#v}"
          case "$REF" in [0-9]*) export VERSION="$REF" ;; esac
          bash scripts/build_app.sh

      - name: Build DMG
        run: |
          cd dist
          hdiutil create -volname "Trace" -srcfolder Trace.app \
            -ov -format UDZO Trace-macos-arm64.dmg

      - name: Notarize & staple
        if: ${{ env.SIGNING_ENABLED == 'true' }}
        env:
          NOTARY_KEY_ID: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          NOTARY_ISSUER_ID: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}
          KEY_P8_BASE64: ${{ secrets.MACOS_NOTARY_KEY_P8_BASE64 }}
        run: |
          set -euo pipefail
          echo "$KEY_P8_BASE64" | base64 --decode > "$RUNNER_TEMP/AuthKey.p8"
          export NOTARY_KEY_PATH="$RUNNER_TEMP/AuthKey.p8"
          # Notarize the DMG, then staple both the DMG and the app inside it.
          bash scripts/notarize.sh dist/Trace-macos-arm64.dmg dist/Trace.app
          rm -f "$RUNNER_TEMP/AuthKey.p8"

      - name: Package zip + checksums
        run: |
          cd dist
          ditto -c -k --keepParent Trace.app Trace-macos-arm64.zip
          shasum -a 256 Trace-macos-arm64.dmg Trace-macos-arm64.zip > SHA256SUMS.txt
          ls -lh

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Trace-macos-arm64
          path: |
            dist/Trace-macos-arm64.zip
            dist/Trace-macos-arm64.dmg
            dist/SHA256SUMS.txt

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/Trace-macos-arm64.zip
            dist/Trace-macos-arm64.dmg
            dist/SHA256SUMS.txt
          generate_release_notes: true
          body: |
            ## XRK → RaceChrono CSV — macOS (Apple Silicon)

            Download **Trace-macos-arm64.dmg**, open it, and drag the app to
            Applications. Drop an `.xrk`/`.xrz` file on the window and convert.

            > **Unsigned builds only:** if this build was not notarized (no signing
            > secrets configured), macOS Gatekeeper will warn on first launch —
            > right-click the app → **Open** → **Open**, or run
            > `xattr -dr com.apple.quarantine /Applications/Trace.app`.
            > Notarized builds open normally.

            Requires macOS 13+ on Apple Silicon.
